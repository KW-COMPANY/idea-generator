<meta name="description" content="複数の要素を組み合わせて新しいビジネスアイデアを生成する無料AIツール">

<meta property="og:title" content="アイデア組み合わせジェネレーター">

<body>

<div class="container">

<header>
<h1>🎨 アイデア組み合わせジェネレーター</h1>
<p class="subtitle">
複数の要素を組み合わせて革新的なアイデアを生み出そう！
</p>
</header>
<h2>●このツールでできること</h2>
<p>
このツールは複数のキーワードを組み合わせて
新しいビジネスアイデアを生成する無料AIツールです。
起業アイデア、商品開発、サービス企画などに活用できます。
</p>

<h2>●使い方</h2>

<ol class="howto">
<li>要素を入力</li>
<li>用途を選択</li>
<li>アイデア生成をクリック</li>
</ol>
<h2>●AIアイデア生成の仕組み</h2>

<p>
このツールは生成AIを利用し、
入力された要素をもとに
市場分析・競合分析を行いながら
ビジネスアイデアを生成します。
</p>
<div class="input-grid" id="inputGrid">

<div class="input-wrapper">
<input type="text" class="input-field" placeholder="例: 消しゴム">
</div>

<div class="input-wrapper">
<input type="text" class="input-field" placeholder="例: 鉛筆">
</div>

</div>

<button class="add-btn" onclick="addInput()">
➕ 要素追加
</button>

<div class="settings-box">

<label class="settings-label">生成数 </label>

<select id="ideaCount" class="settings-input">
<option value="3" selected>3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>

<label class="settings-label" id="usecaseLabel"> 用途</label>
<select id="usecase" class="settings-input">

<option value="B2C">個人向け</option>
<option value="B2B">法人向け</option>
<option value="Education">教育向け</option>
<option value="Creator">クリエイター向け</option>
<option value="SMB">小規模事業者</option>
<option value="Government">行政</option>

</select>

</div>

<button class="generate-btn" onclick="generateIdeas()">
✨ アイデア生成
</button>

<div id="loadingArea" style="display:none;margin-top:20px;">

<div class="progress-wrap">
<div id="progressBar"></div>
</div>

<div id="progressText">
AIがアイデアを考えています...
</div>

</div>


<div class="error-message" id="errorMessage"></div>

<div id="ideasContainer"></div>

</div>

<script>

const WORKER_URL="https://idea-generator-api.gmo-k-watanabe.workers.dev";

/* ===================== Progress（改善①：多重起動防止） ===================== */

let requestId = 0;

function startProgress(){
const bar=document.getElementById("progressBar");

bar.style.width="0%";
const area=document.getElementById("loadingArea");

area.style.display="block";

updateProgress(5, "AIが準備しています...");

}
function updateProgress(percent, message){

const bar=document.getElementById("progressBar");
const text=document.getElementById("progressText");

bar.style.width = percent + "%";

if(message){
text.textContent = message;
}

}

function stopProgress(){

const bar=document.getElementById("progressBar");

bar.style.width="100%";

setTimeout(()=>{

document.getElementById("loadingArea").style.display="none";

bar.style.width="0%";

},600);

}
function escapeHTML(str = ""){

return String(str)
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;")
.replace(/"/g, "&quot;")
.replace(/'/g, "&#39;");

}
/* ===================== Input（改善②：DOM基準で管理） ===================== */

function addInput(){

const inputs = document.querySelectorAll(".input-field");

if(inputs.length>=4){
alert("最大4個までです");
return;
}

const grid=document.getElementById("inputGrid");
const div=document.createElement("div");

div.className="input-wrapper";

div.innerHTML=`
<input type="text" class="input-field" placeholder="要素${inputs.length+1}">
<button class="remove-btn">×</button>
`;

const removeBtn = div.querySelector(".remove-btn");

removeBtn.onclick = () => removeInput(removeBtn);

grid.appendChild(div);

}

function removeInput(btn){
btn.parentElement.remove();
}

/* ===================== Main（改善③：リクエスト競合防止） ===================== */

async function generateIdeas(){

const generateBtn = document.querySelector(".generate-btn");

if(generateBtn.disabled) return;

const myRequestId = ++requestId;

generateBtn.disabled = true;
startProgress();

document.getElementById("errorMessage").classList.remove("active");

const inputs = [...document.querySelectorAll(".input-field")]

.map(i => i.value.trim())
.filter(v => v !== "")
.filter(v => v.length >= 2)
.filter(v => /[ぁ-んァ-ヶ一-龯a-zA-Z0-9]/.test(v))
.filter((v, i, arr) => arr.indexOf(v) === i);

updateProgress(15, "入力内容を確認しています...");

const count=parseInt(document.getElementById("ideaCount").value);
const usecase=document.getElementById("usecase").value;

try{
if(inputs.length<2){
showError("2つ以上入力してください");

throw new Error("VALIDATION_ERROR");

}
updateProgress(30, "AIが市場分析しています...");

const ideas=await callAPI(inputs,count,usecase);

updateProgress(75, "アイデアを整理しています...");

if(myRequestId !== requestId) return;

if(!ideas || ideas.length===0){
showError("アイデア生成に失敗しました");
return;
}

updateProgress(95, "表示を準備しています...");

displayIdeas(ideas);
updateProgress(100, "完了しました");
}catch(e){

if(e?.message === "VALIDATION_ERROR"){
return;
}

console.error(e);

if(e.name === "AbortError"){
showError("タイムアウトしました");
}else if(e?.message?.includes("API")){
showError("サーバーエラー");
}else{
showError("通信エラー");
}

}

finally{

if(myRequestId === requestId){

stopProgress();

generateBtn.disabled = false;

}

}

}

/* ===================== API（改善④：タイムアウト追加） ===================== */

async function callAPI(inputs,count,usecase){

const controller = new AbortController();

const timeout = setTimeout(()=>controller.abort(), 30000);

try{

const res=await fetch(WORKER_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
signal: controller.signal,
body:JSON.stringify({inputs,count,usecase})
});

clearTimeout(timeout);

if(!res.ok){
throw new Error(await res.text());
}

const data=await res.json();

return data.ideas;

}catch(e){

clearTimeout(timeout);
throw e;

}

}

/* ===================== UI ===================== */

function displayIdeas(ideas){

const container=document.getElementById("ideasContainer");

container.innerHTML="";

ideas.forEach((idea,i)=>{

const card=document.createElement("div");

card.className="idea-card";

card.innerHTML=`
<h3>${escapeHTML(idea.title)}</h3>
<p class="idea-desc">
${escapeHTML(idea.description)}
</p>

<div class="score-grid">
<span class="score-badge">
市場性 ${escapeHTML(String(idea.score?.market ?? "-"))}
</span>

<span class="score-badge">
収益性 ${escapeHTML(String(idea.score?.profit ?? "-"))}
</span>

<span class="score-badge">
実現性 ${escapeHTML(String(idea.score?.feasibility ?? "-"))}
</span>
</div>

<div class="section-title">用途</div>
<div class="section-box" data-type="usecase">
${escapeHTML(idea.usecase ?? "-")}向けサービス
</div>

<div class="section-title">市場分析</div>
<div class="section-box" data-type="market">
市場規模: ${escapeHTML(idea.market?.size ?? "-")}<br>
成長性: ${escapeHTML(idea.market?.growth ?? "-")}<br>
ターゲット: ${escapeHTML(idea.market?.target ?? "-")}
</div>

<div class="section-title">競合分析</div>
<div class="section-box" data-type="competition">
競合: ${escapeHTML(
Array.isArray(idea.competition?.competitors)
? idea.competition.competitors
    .filter(v => typeof v === "string" && v.trim())
    .join(", ")
: "競合調査中"
)}<br>
差別化: ${escapeHTML(idea.competition?.gap ?? "-")}
</div>

<div class="section-title">収益モデル</div>
<div class="revenue-box">
モデル: ${escapeHTML(idea.revenue?.model ?? "-")}<br>
価格: ${escapeHTML(idea.revenue?.price ?? "-")}<br>
月商予測: ${escapeHTML(idea.revenue?.monthly ?? "-")}
</div>

<button class="copy-btn">
コピー
</button>
`;
const button = card.querySelector(".copy-btn");

button.dataset.index = i;

button.addEventListener("click", () => {
copyIdea(i, button);
});
container.appendChild(card);

});

}

/* ===================== Error + Copy ===================== */

function showError(msg){

const el=document.getElementById("errorMessage");

el.textContent=msg;

el.classList.add("active");

setTimeout(()=>el.classList.remove("active"),3000);

}

function copyIdea(index,btn){

const card=document.querySelectorAll(".idea-card")[index];

const title=card.querySelector("h3")?.textContent || "";
const desc=card.querySelector(".idea-desc")?.textContent || "";

const scores=[...card.querySelectorAll(".score-badge")]
.map(s=>s.textContent)
.join(" / ");

const usecase=card.querySelector('[data-type="usecase"]')?.textContent||"-";
const market=card.querySelector('[data-type="market"]')?.textContent||"-";
const competition=card.querySelector('[data-type="competition"]')?.textContent||"-";
const revenue=card.querySelector(".revenue-box")?.textContent||"-";

const text=`
【アイデア】
${title}

【説明】
${desc}

【スコア】
${scores}

【用途】
${usecase}

【市場分析】
${market}

【競合分析】
${competition}

【収益モデル】
${revenue}
`;

navigator.clipboard.writeText(text)

.then(()=>{

btn.disabled=true;
btn.textContent="コピー済み ✓";
btn.style.background="#4caf50";

setTimeout(()=>{
btn.disabled=false;
btn.textContent="コピー";
btn.style.background="#667eea";
},2000);

})

.catch(()=>{

btn.textContent="失敗";

alert("コピーに失敗しました");

});

}

</script>

</body>
</html>
