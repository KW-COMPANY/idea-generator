<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>アイデア組み合わせジェネレーター</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;
padding:20px;
color:#333;
}

.container{
max-width:1200px;
margin:0 auto;
}

header{
text-align:center;
margin-bottom:40px;
}

h1{
color:white;
font-size:2.5em;
margin-bottom:10px;
}

.subtitle{
color:rgba(255,255,255,0.9);
}

.input-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.input-wrapper{
position:relative;
}

.input-field{
width:100%;
padding:15px 40px 15px 15px;
border:3px solid #e0e0e0;
border-radius:12px;
font-size:1.1em;
}

.remove-btn{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
background:#ff6b6b;
color:white;
border:none;
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
}

.add-btn{
background:linear-gradient(135deg,#56ab2f,#a8e063);
color:white;
border:none;
padding:12px 30px;
border-radius:25px;
cursor:pointer;
}

.generate-btn{
width:100%;
background:linear-gradient(135deg,#f093fb,#f5576c);
color:white;
border:none;
padding:20px;
border-radius:15px;
font-size:1.2em;
margin-bottom:20px;
cursor:pointer;
}

.loading{
display:none;
text-align:center;
padding:40px;
}

.loading.active{
display:block;
}

.spinner{
border:4px solid #f3f3f3;
border-top:4px solid #667eea;
border-radius:50%;
width:50px;
height:50px;
animation:spin 1s linear infinite;
margin:0 auto 20px;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.progress-wrap{
width:100%;
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

#progressBar{
width:0%;
height:100%;
background:linear-gradient(90deg,#f093fb,#f5576c);
transition:width .4s;
}

.idea-card{
background:white;
border-radius:18px;
padding:28px;
margin-bottom:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
border-top:6px solid #f5576c;
}

.section-title{
font-size:1.05em;
font-weight:700;
margin-top:16px;
margin-bottom:6px;
}

.section-box{
background:#fafafa;
padding:12px 14px;
border-radius:10px;
margin-bottom:8px;
}

.revenue-box{
background:linear-gradient(135deg,#fff0f4,#ffe6ef);
padding:14px;
border-radius:12px;
margin-top:10px;
}

.settings-box{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
color:white;
font-weight:600;
}

.settings-input{
padding:8px;
border-radius:8px;
border:none;
}

.score-grid{
display:flex;
gap:10px;
margin:10px 0;
flex-wrap:wrap;
}

.score-badge{
background:#eef1ff;
padding:6px 12px;
border-radius:20px;
font-size:0.9em;
font-weight:600;
color:#4a54e1;
}

.copy-btn{
background:#667eea;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-size:0.9em;
margin-top:12px;
}

.error-message{
background:#ffebee;
color:#c62828;
padding:15px;
border-radius:10px;
margin-top:20px;
display:none;
}

.error-message.active{
display:block;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🎨 アイデア組み合わせジェネレーター</h1>
<p class="subtitle">複数の要素を組み合わせて革新的なアイデアを生み出そう！</p>
</header>

<div class="input-grid" id="inputGrid">

<div class="input-wrapper">
<input type="text" class="input-field" placeholder="例: 消しゴム">
</div>

<div class="input-wrapper">
<input type="text" class="input-field" placeholder="例: 鉛筆">
</div>

</div>

<button class="add-btn" onclick="addInput()">➕ 要素追加</button>

<div class="settings-box">
<label>生成数</label>
<input type="number" id="ideaCount" min="3" max="5" value="3" class="settings-input">

<label>用途</label>
<select id="usecase" class="settings-input">
<option value="B2C">個人向け</option>
<option value="B2B">法人向け</option>
<option value="Education">教育向け</option>
<option value="Creator">クリエイター向け</option>
<option value="SMB">小規模事業者</option>
<option value="Government">行政</option>
</select>

</div>

<button class="generate-btn" onclick="generateIdeas()">✨ アイデア生成</button>

<div id="loadingArea" style="display:none;margin-top:20px;">
<div class="progress-wrap">
<div id="progressBar"></div>
</div>
<div id="progressText">AIがアイデアを考えています...</div>
</div>

<div class="error-message" id="errorMessage"></div>

<div id="ideasContainer"></div>

</div>

<script>

const WORKER_URL="https://idea-generator-api.gmo-k-watanabe.workers.dev";

const messages=[
"AIが市場を調査しています...",
"競合を分析しています...",
"ビジネスモデルを設計しています...",
"収益性を計算しています..."
]

function startProgress(){

const bar=document.getElementById("progressBar")
const area=document.getElementById("loadingArea")
const text=document.getElementById("progressText")

let step=0
let progress=0

area.style.display="block"

const timer=setInterval(()=>{

progress+=Math.random()*10
if(progress>=90) progress=90

bar.style.width=progress+"%"

if(step<messages.length){
text.textContent=messages[step]
step++
}

},1200)

return timer
}

function stopProgress(timer){

clearInterval(timer)

const bar=document.getElementById("progressBar")

bar.style.width="100%"

setTimeout(()=>{
document.getElementById("loadingArea").style.display="none"
bar.style.width="0%"
},600)

}

let inputCount=2;

function addInput(){

if(inputCount>=4){
alert("最大4個までです");
return;
}

inputCount++;

const grid=document.getElementById("inputGrid");

const div=document.createElement("div");
div.className="input-wrapper";

div.innerHTML=`
<input type="text" class="input-field" placeholder="要素${inputCount}">
<button class="remove-btn" onclick="removeInput(this)">×</button>
`;

grid.appendChild(div);

}

function removeInput(btn){

function updateInputCount(){
  inputCount = document.querySelectorAll(".input-field").length;
}

async function generateIdeas(){

const timer=startProgress()

document.getElementById("errorMessage").classList.remove("active")
function removeInput(btn){
  btn.parentElement.remove();
  updateInputCount();
}
const inputs=[...document.querySelectorAll(".input-field")]
.map(i=>i.value.trim())
.filter(v=>v!=="")

if(inputs.length<2){
showError("2つ以上入力してください")
stopProgress(timer)
return
}

const count=parseInt(document.getElementById("ideaCount").value)
const usecase=document.getElementById("usecase").value

try{

const ideas=await callAPI(inputs,count,usecase)

if(!ideas || ideas.length===0){
showError("アイデア生成に失敗しました")
stopProgress(timer)
return
}

displayIdeas(ideas)

}catch(e){
console.error(e)
showError("API通信エラー")
stopProgress(timer)
}

stopProgress(timer)

}
let isStopped = false;

function stopProgress(timer){
  if(isStopped) return;
  isStopped = true;

  clearInterval(timer);

  const bar = document.getElementById("progressBar");
  bar.style.width = "100%";

  setTimeout(()=>{
    document.getElementById("loadingArea").style.display = "none";
    bar.style.width = "0%";
    isStopped = false;
  },600);
}
async function callAPI(inputs,count,usecase){

const res=await fetch(WORKER_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:inputs,
count:count,
usecase:usecase
})
})

if(!res.ok){
const text=await res.text()
throw new Error(text)
}

const data=await res.json()

return data.ideas

}

function displayIdeas(ideas){

const container=document.getElementById("ideasContainer")
container.innerHTML=""

ideas.forEach((idea,i)=>{

const card=document.createElement("div")
card.className="idea-card"

card.innerHTML=`
<h3>${idea.title}</h3>

<p class="idea-desc">${idea.description}</p>

<div class="score-grid">
<span class="score-badge">市場性 ${idea.score?.market ?? "-"}</span>
<span class="score-badge">収益性 ${idea.score?.profit ?? "-"}</span>
<span class="score-badge">実現性 ${idea.score?.feasibility ?? "-"}</span>
</div>

<div class="section-title">用途</div>
<div class="section-box" data-type="usecase">${idea.usecase ?? "-"}向けサービス</div>

<div class="section-title">市場分析</div>
<div class="section-box" data-type="market">
市場規模: ${idea.market?.size ?? "-"}<br>
成長性: ${idea.market?.growth ?? "-"}<br>
ターゲット: ${idea.market?.target ?? "-"}
</div>

<div class="section-title">競合分析</div>
<div class="section-box" data-type="competition">
競合: ${(idea.competition?.competitors?.length
? idea.competition.competitors.join(", ")
: "競合調査中")}<br>
差別化: ${idea.competition?.gap ?? "-"}
</div>

<div class="section-title">収益モデル</div>
<div class="revenue-box">
モデル: ${idea.revenue?.model ?? "-"}<br>
価格: ${idea.revenue?.price ?? "-"}<br>
月商予測: ${idea.revenue?.monthly ?? "-"}
</div>

<button class="copy-btn" onclick="copyIdea(${i}, this)">コピー</button>
`

container.appendChild(card)

})

}

function showError(msg){
const el=document.getElementById("errorMessage")
el.textContent=msg
el.classList.add("active")

setTimeout(()=>{
el.classList.remove("active")
},3000)
}

function copyIdea(index, btn){

const card = document.querySelectorAll(".idea-card")[index]

const title = card.querySelector("h3").textContent
const desc = card.querySelector(".idea-desc").textContent

const scores = [...card.querySelectorAll(".score-badge")]
.map(s => s.textContent)
.join(" / ")

const usecase = card.querySelector('[data-type="usecase"]')?.textContent || "-"
const market = card.querySelector('[data-type="market"]')?.textContent || "-"
const competition = card.querySelector('[data-type="competition"]')?.textContent || "-"

const revenue = card.querySelector(".revenue-box")?.textContent || "-"

const text = `
【アイデア】
${title}

【説明】
${desc}

【スコア】
${scores}

【用途】
${usecase}

【市場分析】
${market}

【競合分析】
${competition}

【収益モデル】
${revenue}
`

navigator.clipboard.writeText(text)
.then(()=>{

btn.disabled = true
btn.textContent="コピー済み ✓"
btn.style.background="#4caf50"

setTimeout(()=>{
btn.disabled = false
btn.textContent="コピー"
btn.style.background="#667eea"
},2000)

})
  
.catch(()=>{
btn.textContent="失敗"
})

}

</script>

</body>
</html>
