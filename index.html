<body>
    <div class="container">
        <header>
            <h1 onclick="resetToHome()" style="cursor:pointer;">
  🎨 アイデア組み合わせジェネレーター

        </header>

        <div class="main-card">
            <!-- 設定パネル -->
            <div class="settings-toggle">
                <button class="settings-btn" onclick="toggleSettings()">⚙️ 設定</button>
            </div>

            <div class="settings-panel" id="settingsPanel">
                <div class="setting-item">
                    <label>生成するアイデア数（3〜5個）</label>
                    <input type="number" id="ideaCount" min="3" max="5" value="3">
                </div>

                </div>

            <!-- 入力セクション -->
            <div class="input-section">
                <div class="input-grid" id="inputGrid">
                    <div class="input-wrapper">
                        <input type="text" class="input-field" placeholder="例: 消しゴム" data-index="0">
                    </div>
                    <div class="input-wrapper">
                        <input type="text" class="input-field" placeholder="例: 鉛筆" data-index="1">
                    </div>
                </div>
                <button class="add-btn" onclick="addInput()" id="addBtn">
                    ➕ 要素を追加（最大4個）
                </button>
            </div>

            <!-- 生成ボタン -->
            <button class="generate-btn" onclick="generateIdeas()" id="generateBtn">
                ✨ アイデアを生成する
            </button>

            <!-- ローディング -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AIがアイデアを考え中...</p>
            </div>

            <!-- エラーメッセージ -->
            <div class="error-message" id="errorMessage"></div>

            <!-- 結果セクション -->
            <div class="results-section" id="resultsSection">
                <div class="results-header">
                    <h2 class="results-title">💡 生成されたアイデア</h2>
                    <div class="action-buttons">
                        <button class="action-btn save-btn" onclick="saveIdeas()">💾 保存</button>
                        <button class="action-btn share-btn" onclick="openShareModal()">🔗 シェア</button>
                        <button class="action-btn pdf-btn" onclick="exportPDF()">📄 テキスト出力</button>
                    </div>
                </div>
                <div id="ideasContainer"></div>
            </div>

            <!-- 履歴セクション -->
            <div class="history-section" id="historySection" style="display: none;">
                <div class="history-title">
                    📚 生成履歴
                    <button class="clear-history-btn" onclick="clearHistory()">履歴をクリア</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>

    <!-- シェアモーダル -->
    <div class="share-modal" id="shareModal">
        <div class="share-content">
            <h3 style="margin-bottom: 15px; color: #667eea;">シェアする</h3>

                </div>

        </div>
    </div>

    <script>
const WORKER_URL = "https://idea-generator-api.gmo-k-watanabe.workers.dev";

        let inputCount = 2;
        let currentIdeas = [];
        let currentCombination = [];

        // 設定パネルの切り替え
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('active');
        }

        // 入力フィールドを追加
        function addInput() {
            if (inputCount >= 4) {
                alert('最大4個までです');
                return;
            }

            inputCount++;
            const inputGrid = document.getElementById('inputGrid');
            const wrapper = document.createElement('div');
            wrapper.className = 'input-wrapper';
            wrapper.innerHTML = `
                <input type="text" class="input-field" placeholder="要素${inputCount}" data-index="${inputCount - 1}">
                <button class="remove-btn" onclick="removeInput(this)">×</button>
            `;
            inputGrid.appendChild(wrapper);

            if (inputCount >= 4) {
                document.getElementById('addBtn').disabled = true;
            }
        }

        // 入力フィールドを削除
        function removeInput(btn) {
            btn.parentElement.remove();
            inputCount--;
            document.getElementById('addBtn').disabled = false;
            
            // インデックスを再割り当て
            const inputs = document.querySelectorAll('.input-field');
            inputs.forEach((input, index) => {
                input.dataset.index = index;
            });
        }

        // 不適切なコンテンツチェック
        function containsInappropriateContent(text) {
            const inappropriateKeywords = [
                'アダルト', 'エロ', '性的', 'ポルノ', 'セックス', 
                '暴力', '違法', '犯罪', '麻薬', 'ドラッグ'
            ];
            
            const lowerText = text.toLowerCase();
            return inappropriateKeywords.some(keyword => 
                lowerText.includes(keyword.toLowerCase())
            );
        }

        // アイデア生成
        async function generateIdeas() {
            // 入力値を取得
            const inputs = Array.from(document.querySelectorAll('.input-field'))
                .map(input => input.value.trim())
                .filter(value => value !== '');

            if (inputs.length < 2) {
                showError('少なくとも2つの要素を入力してください');
                return;
            }

            // 不適切なコンテンツチェック
            const hasInappropriate = inputs.some(input => containsInappropriateContent(input));
            if (hasInappropriate) {
                showError('不適切な内容が含まれています。別の言葉を使用してください。');
                return;
            }

            // APIキーチェック

            currentCombination = inputs;

            // UI更新
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('loading').classList.add('active');
            document.getElementById('resultsSection').classList.remove('active');
            hideError();

            try {
                const ideaCount = parseInt(document.getElementById('ideaCount').value);
                const ideas = await callGeminiAPI(inputs, ideaCount);
                
                currentIdeas = ideas;
                displayIdeas(ideas, inputs);
                saveToHistory(inputs, ideas);
                
            } catch (error) {
                showError('アイデア生成に失敗しました: ' + error.message);
                console.error(error);
            } finally {
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('loading').classList.remove('active');
            }
        }

        // Gemini APIを呼び出す
        async function callGeminiAPI(inputs, count) {
  const response = await fetch(WORKER_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      inputs: inputs,
      count: count
    })
  });

  if (!response.ok) {
    const text = await response.text();
    throw new Error(text);
  }

  const data = await response.json();

  if (!data.ideas || !Array.isArray(data.ideas)) {
    throw new Error("不正なレスポンス形式です");
  }

  return data.ideas.map(idea => ({
    name: idea.title,
    description: idea.description,
    examples: idea.examples || []
  }));
}

// アイデアを表示
function displayIdeas(ideas, inputs) {
    const container = document.getElementById('ideasContainer');
    container.innerHTML = '';

    const combination = inputs.join(' × ');
    
    ideas.forEach((idea, index) => {
        const card = document.createElement('div');
        card.className = 'idea-card';
        card.innerHTML = `
            <div class="idea-number">アイデア ${index + 1}</div>

            <h3 class="idea-name">${escapeHtml(idea.name)}</h3>

            <p class="idea-description">${escapeHtml(idea.description)}</p>

            <div class="idea-examples">
                <h4>💡 活用例</h4>
                <ul>
                    ${idea.examples.map(ex => `<li>${escapeHtml(ex)}</li>`).join('')}
                </ul>
            </div>

            <div style="margin-top:15px;">
                <button 
                    onclick="improveIdea('${escapeHtml(idea.name)}')" 
                    style="
                        background:#667eea;
                        color:white;
                        border:none;
                        padding:10px 16px;
                        border-radius:8px;
                        cursor:pointer;
                        font-size:0.9em;
                    ">
                    🤖 AIで改良
                </button>
                <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">

<button onclick="generatePitch('${escapeHtml(idea.name)}')">
📊 ピッチ資料
</button>

<button onclick="generateLP('${escapeHtml(idea.name)}')">
🌐 LP生成
</button>

<button onclick="generatePlan('${escapeHtml(idea.name)}')">
📈 売上シミュレーション
</button>

</div>
            </div>
        `;
        container.appendChild(card);
    });

    document.getElementById('resultsSection').classList.add('active');
}

        // HTMLエスケープ
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // エラー表示
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('active');
        }

        // 履歴に保存
        function saveToHistory(inputs, ideas) {
            const history = JSON.parse(localStorage.getItem('ideaHistory') || '[]');
            
            history.unshift({
                combination: inputs.join(' × '),
                ideas: ideas,
                date: new Date().toLocaleString('ja-JP')
            });

            // 最大20件まで保存
            if (history.length > 20) {
                history.pop();
            }

            localStorage.setItem('ideaHistory', JSON.stringify(history));
            displayHistory();
        }

        // 履歴を表示
        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('ideaHistory') || '[]');
            
            if (history.length === 0) {
                document.getElementById('historySection').style.display = 'none';
                return;
            }

            document.getElementById('historySection').style.display = 'block';
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            history.forEach((item, index) => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <div class="history-combination">${escapeHtml(item.combination)}</div>
                    <div class="history-date">${item.date}</div>
                `;
                historyItem.onclick = () => loadFromHistory(index);
                historyList.appendChild(historyItem);
            });
        }

        // 履歴から読み込み
        function loadFromHistory(index) {
            const history = JSON.parse(localStorage.getItem('ideaHistory') || '[]');
            const item = history[index];

            const inputs = item.combination.split(' × ');
            currentIdeas = item.ideas;
            currentCombination = inputs;

            displayIdeas(item.ideas, inputs);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 履歴をクリア
        function clearHistory() {
            if (confirm('履歴を全て削除しますか？')) {
                localStorage.removeItem('ideaHistory');
                displayHistory();
            }
        }

        // アイデアを保存
        function saveIdeas() {
            const savedIdeas = JSON.parse(localStorage.getItem('savedIdeas') || '[]');
            
            savedIdeas.push({
                combination: currentCombination.join(' × '),
                ideas: currentIdeas,
                date: new Date().toLocaleString('ja-JP')
            });

            localStorage.setItem('savedIdeas', JSON.stringify(savedIdeas));
            alert('💾 アイデアを保存しました！');
        }

        // シェアモーダルを開く
        function openShareModal() {
            document.getElementById('shareModal').classList.add('active');
        }

        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('active');
        }

        // Twitter シェア
        function shareToTwitter() {
            const text = `${currentCombination.join(' × ')} を組み合わせたアイデア\n\n${currentIdeas[0].name}\n${currentIdeas[0].description}`;
            const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        // Facebook シェア
        function shareToFacebook() {
            const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`;
            window.open(url, '_blank');
        }

        // LINE シェア
        function shareToLine() {
            const text = `${currentCombination.join(' × ')} のアイデア: ${currentIdeas[0].name}`;
            const url = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        // クリップボードにコピー
        function copyToClipboard() {
            let text = `【${currentCombination.join(' × ')}】のアイデア\n\n`;
            currentIdeas.forEach((idea, index) => {
                text += `${index + 1}. ${idea.name}\n${idea.description}\n\n`;
            });

            navigator.clipboard.writeText(text).then(() => {
                alert('📋 クリップボードにコピーしました！');
                closeShareModal();
            });
        }

        // PDF出力
        function exportPDF() {
            // jsPDFライブラリを動的に読み込み
            if (typeof window.jspdf === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                script.onload = () => generatePDF();
                document.head.appendChild(script);
            } else {
                generatePDF();
            }
        }

        function generatePDF() {
            // 簡易版: テキストファイルとしてダウンロード
            let content = `アイデア組み合わせジェネレーター\n`;
            content += `組み合わせ: ${currentCombination.join(' × ')}\n`;
            content += `生成日時: ${new Date().toLocaleString('ja-JP')}\n\n`;
            content += `${'='.repeat(50)}\n\n`;

            currentIdeas.forEach((idea, index) => {
                content += `【アイデア ${index + 1}】\n`;
                content += `名前: ${idea.name}\n\n`;
                content += `説明:\n${idea.description}\n\n`;
                content += `活用例:\n`;
                idea.examples.forEach((ex, i) => {
                    content += `${i + 1}. ${ex}\n`;
                });
                content += `\n${'='.repeat(50)}\n\n`;
            });

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `アイデア_${currentCombination.join('×')}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);

            alert('📄 テキストファイルとしてダウンロードしました！');
        }

        // ページ読み込み時に履歴を表示
        window.addEventListener('load', () => {
            displayHistory();
          
        });
      function resetToHome() {
    window.location.reload();
}

            data.description
        );

    }catch(error){
        alert("AI改良に失敗しました: " + error.message);
        console.error(error);
    }

}
